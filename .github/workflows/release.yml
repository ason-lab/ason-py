name: asun-py release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish all built artifacts to PyPI after successful builds"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build source distribution
        run: |
          python -m pip install -U build
          python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: asun-py-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-24.04
            arch_env_name: CIBW_ARCHS_LINUX
            arch_env_value: "x86_64 i686 aarch64"
          - name: macos
            runner: macos-15
            arch_env_name: CIBW_ARCHS_MACOS
            arch_env_value: "x86_64 arm64"
          - name: windows
            runner: windows-2025
            arch_env_name: CIBW_ARCHS_WINDOWS
            arch_env_value: "AMD64 x86 ARM64"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Enable QEMU for Linux cross-arch builds
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Install build tools
        run: python -m pip install -U pip

      - name: Build wheels
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch_env_name == 'CIBW_ARCHS_LINUX' && matrix.arch_env_value || '' }}
          CIBW_ARCHS_MACOS: ${{ matrix.arch_env_name == 'CIBW_ARCHS_MACOS' && matrix.arch_env_value || '' }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.arch_env_name == 'CIBW_ARCHS_WINDOWS' && matrix.arch_env_value || '' }}
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            bash build-wheels.sh
          else
            python -m pip install -U build cibuildwheel twine
            rm -rf dist
            mkdir -p dist
            python -m cibuildwheel --output-dir dist
          fi
        shell: bash

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs:
      - build-sdist
      - build-wheels
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
